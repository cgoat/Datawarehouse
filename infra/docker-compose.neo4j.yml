# Neo4j 5 Community for Phase 5 — display of the knowledge graph.
# Runs alongside the existing Postgres warehouse on the host (no need to
# network them together; the loader connects to both from the host).
#
#   docker compose -f infra/docker-compose.neo4j.yml up -d
#   docker compose -f infra/docker-compose.neo4j.yml down        # keeps data
#   docker compose -f infra/docker-compose.neo4j.yml down -v     # wipes data
#
# Browser: http://localhost:7474   (login with NEO4J_USER / NEO4J_PASSWORD from .env)
# Bolt:    bolt://localhost:7687

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: dw-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP — Neo4j Browser
      - "7687:7687"   # Bolt — Python driver
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-dw_neo4j_pw}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
